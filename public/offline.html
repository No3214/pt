<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ela PT - Offline</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Outfit',system-ui,sans-serif;background:#FAF6F1;color:#1a1a1a}
    @media(prefers-color-scheme:dark){body{background:#050505;color:#f5f5f5}}
    .container{text-align:center;padding:2rem;max-width:420px}
    .icon{font-size:4rem;margin-bottom:1.5rem}
    h1{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;margin-bottom:0.75rem}
    p{font-size:0.95rem;opacity:0.6;line-height:1.6;margin-bottom:2rem}
    button{background:#C2684A;color:#fff;border:none;padding:0.8rem 2rem;border-radius:999px;font-size:0.95rem;font-weight:500;cursor:pointer;transition:all 0.3s}
    button:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(194,104,74,0.3)}
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Bağlantı Yok</h1>
    <p>Şu an internet bağlantınız yok gibi görünüyor. Bağlantınız geri geldiğinde sayfa otomatik yenilenecek.</p>
    <button onclick="window.location.reload()">Tekrar Dene</button>
  </div>
  <script>window.addEventListener('online',()=>window.location.reload())</script>
</body>
</html>
